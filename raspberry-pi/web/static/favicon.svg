<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Latar tema UGM -->
  <rect width="64" height="64" rx="8" fill="#003d7a"/>
  <!-- Panel surya (grid sel) -->
  <g transform="translate(10 16)">
    <rect x="0" y="0" width="44" height="28" rx="2" fill="#0a59a8" stroke="#cfe2ff" stroke-width="1.5"/>
    <!-- garis grid vertikal -->
    <line x1="11" y1="1" x2="11" y2="27" stroke="#cfe2ff" stroke-width="1"/>
    <line x1="22" y1="1" x2="22" y2="27" stroke="#cfe2ff" stroke-width="1"/>
    <line x1="33" y1="1" x2="33" y2="27" stroke="#cfe2ff" stroke-width="1"/>
    <!-- garis grid horizontal -->
    <line x1="1" y1="9.3" x2="43" y2="9.3" stroke="#cfe2ff" stroke-width="1"/>
    <line x1="1" y1="18.6" x2="43" y2="18.6" stroke="#cfe2ff" stroke-width="1"/>
  </g>
  <!-- Bar pembersih (wiper) melintang -->
  <rect x="8" y="26" width="48" height="4" rx="2" fill="#f4b41a"/>
  <!-- Tetesan air -->
  <circle cx="20" cy="50" r="2.4" fill="#5eb3f6"/>
  <circle cx="32" cy="52" r="2.4" fill="#5eb3f6"/>
  <circle cx="44" cy="50" r="2.4" fill="#5eb3f6"/>
</svg>
