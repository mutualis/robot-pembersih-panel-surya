; ============================================
; Solar Panel Cleaning Robot — ESP32 Firmware
; PRODUCTION BUILD (satu-satunya environment)
; ============================================
;
; Langsung Normal Mode tanpa menu. Siap dikendalikan
; oleh Raspberry Pi via UART2 (GPIO 16/17) JSON 115200.
;
; Build & upload:
;   pio run --target upload
; Monitor serial:
;   pio device monitor
; ============================================

[env:production]
platform = espressif32
board = esp32dev
framework = arduino

; Serial monitor
monitor_speed = 115200
monitor_filters =
    esp32_exception_decoder
    time

; Build flags (optimasi ukuran untuk produksi)
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM
    -DCONFIG_FREERTOS_HZ=1000
    -DCONFIG_ARDUINO_RUNNING_CORE=1
    -DCONFIG_ARDUINO_EVENT_RUNNING_CORE=1
    -Os

; Libraries
lib_deps =
    bblanchon/ArduinoJson@^6.21.3

; Upload settings
upload_speed = 921600

; Semua file di src/ adalah produksi (main.cpp + modul inti).
build_src_filter =
    +<*>
